# Hyprland config ported from sway (initial scaffold)
# Review keybindings and workspace dispatch commands before use.

# Basic variables (edit to your taste)
# Note: Hyprland uses literal binds; replace MOD below if desired.
MOD=SUPER

# Output settings (adjust to your monitors)
# Use hyprctl monitors -j to get monitor names and positions
# Example: monitor=HDMI-A-1,1920x1080@60,1920x0

# Autostart / daemons
exec = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=hyprland
exec-once = /usr/lib/xdg-desktop-portal-wlr
exec-once = /usr/lib/xdg-desktop-portal -r

# Lock screen (uses swaylock from sway config)
exec = swaylock --color 2d353b --font "Iosevka Nerd Font Mono"

# Fonts
font = Iosevka Nerd Font Mono 12

# Autostart apps (from sway)
exec-once = autotiling -l 2
exec-once = flameshot
exec-once = /usr/bin/emacs --daemon
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &
exec-once = nm-applet
exec-once = waybar
exec-once = swww-daemon
exec-once = bash -c 'swww img "$(find ~/wallpapers-extra/flowers -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.webp" \) | shuf -n1)" -t none'
exec-once = mako
exec-once = nwg-wrapper -t sway.pango -p right -mr 10
exec-once = nwg-wrapper -s quick.sh -a end -p left -ml 10 -mb 10 -r 60
exec-once = nwg-wrapper -s quote.sh -p left -a end -mb 10 -ml 260

# Workspace / window rules
# Hyprland uses windowrule for certain behaviors; convert as needed.
# Example: windowrulev2 = float,class:Blah,size:600x400,center

# Keybindings (examples — verify syntax and adjust)
bind = SUPER,Return,exec,kitty
bind = SUPER,e,exec,emacsclient -c
bind = SUPER+Shift,c,reload,config
bind = SUPER+Shift,e,exec,hyprctl dispatch exit
bind = SUPER,d,exec,rofi -show drun
bind = Print,exec,flameshot gui

# Volume and brightness (may need custom scripts or hyprland dispatch)
bind = XF86AudioMute,exec,pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = XF86AudioLowerVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = XF86AudioRaiseVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = XF86MonBrightnessDown,exec,brightnessctl set 5%-
bind = XF86MonBrightnessUp,exec,brightnessctl set 5%+

# Include any additional configs
# include = /etc/hypr/*.conf

# End of scaffold — refine binds and rules to match sway behaviour
