# Hyprland config ported from sway (initial scaffold)
# Review keybindings and workspace dispatch commands before use.

# Basic variables (edit to your taste)
# Note: Hyprland uses literal binds; replace MOD below if desired.
MOD=SUPER

# Output settings (adjust to your monitors)
# Use hyprctl monitors -j to get monitor names and positions
# Example: monitor=HDMI-A-1,1920x1080@60,1920x0

# Autostart / daemons
exec = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=hyprland
exec-once = /usr/lib/xdg-desktop-portal-wlr
exec-once = /usr/lib/xdg-desktop-portal -r

# Lock screen (uses swaylock from sway config)
exec = swaylock --color 2d353b --font "Iosevka Nerd Font Mono"

# Fonts
font = Iosevka Nerd Font Mono 12

# Autostart apps (from sway)
exec-once = autotiling -l 2
exec-once = flameshot
exec-once = /usr/bin/emacs --daemon
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &
exec-once = nm-applet
exec-once = waybar
exec-once = swww-daemon
exec-once = bash -c 'swww img "$(find ~/wallpapers-extra/flowers -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.webp" \) | shuf -n1)" -t none'
exec-once = mako
exec-once = nwg-wrapper -t sway.pango -p right -mr 10
exec-once = nwg-wrapper -s quick.sh -a end -p left -ml 10 -mb 10 -r 60
exec-once = nwg-wrapper -s quote.sh -p left -a end -mb 10 -ml 260

# Workspace / window rules
# Hyprland uses windowrule for certain behaviors; convert as needed.
# Example: windowrulev2 = float,class:Blah,size:600x400,center

# Keybindings (examples — verify syntax and adjust)
bind = SUPER,Return,exec,kitty
bind = SUPER,e,exec,emacsclient -c

# Keybindings (converted from sway)
# NOTE: Review the following bindings and adjust modifiers/keys to match your Hyprland version.

# Launchers and apps
bind = SUPER,Return,exec,kitty
bind = SUPER,e,exec,emacsclient -c
bind = SUPER,a,exec,sticky enable
bind = SUPER,v,exec,sh,-c,cliphist list | rofi -dmenu -p "Clipboard" -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy
bind = SUPER,s,exec,sh,-c,rofi -show emoji -modi emoji -matching regex -sorting-method levenshtein

# Lock and utilities
bind = SUPER+Shift,t,exec,swaylock --color 2d353b --inside-color 3a454a --indicator-radius 100 --indicator-thickness 10 --font "Iosevka Nerd Font Mono"
bind = SUPER+u,exec,~/.config/hypr/scripts/tiling.sh
bind = SUPER+g,exec,~/.config/hypr/scripts/prompt-record.sh
bind = SUPER+y,exec,nemo
bind = SUPER+Shift+a,exec,pkill -SIGUSR2 waybar
bind = SUPER+b,exec,flatpak run com.brave.Browser
bind = SUPER,w,closewindow

# Wallpaper, menu and screenshots
bind = SUPER+c,exec,~/.config/hypr/scripts/wallpaper.sh
bind = CTRL+ALT,Delete,exec,nwg-bar
bind = SUPER,d,exec,rofi -show drun
bind = Print,exec,flameshot gui

# Reload config and exit
bind = SUPER+Shift,c,exec,hyprctl reload
bind = SUPER+Shift,e,exec,hyprctl dispatch exit

# Focus movement
bind = SUPER,Left,exec,hyprctl dispatch focusleft
bind = SUPER,Down,exec,hyprctl dispatch focusdown
bind = SUPER,Up,exec,hyprctl dispatch focusup
bind = SUPER,Right,exec,hyprctl dispatch focusright

# Move focused window (review: Hyprland uses different move actions)
# These are placeholders — adjust to your preferred behavior.
bind = SUPER+Shift,Left,exec,hyprctl dispatch movetoleft
bind = SUPER+Shift,Down,exec,hyprctl dispatch movetodown
bind = SUPER+Shift,Up,exec,hyprctl dispatch movetoup
bind = SUPER+Shift,Right,exec,hyprctl dispatch movetoright

# Workspaces (numbers)
bind = SUPER,1,exec,hyprctl dispatch workspace 1
bind = SUPER,2,exec,hyprctl dispatch workspace 2
bind = SUPER,3,exec,hyprctl dispatch workspace 3
bind = SUPER,4,exec,hyprctl dispatch workspace 4
bind = SUPER,5,exec,hyprctl dispatch workspace 5
bind = SUPER,6,exec,hyprctl dispatch workspace 6
bind = SUPER,7,exec,hyprctl dispatch workspace 7
bind = SUPER,8,exec,hyprctl dispatch workspace 8
bind = SUPER,9,exec,hyprctl dispatch workspace 9
bind = SUPER,0,exec,hyprctl dispatch workspace 10

# Toggle fullscreen / floating / layout
bind = SUPER,f,exec,hyprctl dispatch togglefullscreen
bind = SUPER+Shift,space,exec,hyprctl dispatch togglefloating
bind = SUPER,space,exec,hyprctl dispatch focusmode

# Resize mode (Hyprland doesn't have modal resize like sway)
# Provide resize keys that call hyprctl resize or use mouse resize instead.
bind = SUPER,r,exec,sh,-c,"echo 'Enter resize mode manually or bind specific resize actions'"

# Volume and brightness
bind = XF86AudioMute,exec,pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = XF86AudioLowerVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = XF86AudioRaiseVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = XF86AudioMicMute,exec,pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind = XF86MonBrightnessDown,exec,brightnessctl set 5%-
bind = XF86MonBrightnessUp,exec,brightnessctl set 5%+

# Scratchpad / misc
bind = SUPER+Shift,minus,exec,hyprctl dispatch movetoscratchpad
bind = SUPER,minus,exec,hyprctl dispatch showscratchpad

# End of converted bindings — Verify and adjust any "dispatch" commands

# Volume and brightness (may need custom scripts or hyprland dispatch)
bind = XF86AudioMute,exec,pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = XF86AudioLowerVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = XF86AudioRaiseVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = XF86MonBrightnessDown,exec,brightnessctl set 5%-
bind = XF86MonBrightnessUp,exec,brightnessctl set 5%+

# Include any additional configs
# include = /etc/hypr/*.conf

# End of scaffold — refine binds and rules to match sway behaviour
